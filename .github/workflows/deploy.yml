name: Validate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Validation ──────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML5
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: public
          css: true
          extra: "--ignore-re 'Attribute .lang. not allowed on element .div.'"

      - name: Check target=_blank links have noopener
        run: |
          if grep -rn 'target="_blank"' --include="*.html" public/ | grep -v 'noopener'; then
            echo "❌ Found target=\"_blank\" links missing rel=\"noopener noreferrer\""
            exit 1
          fi
          echo "✅ All target=\"_blank\" links have noopener"

      - name: Check shared CSS is present
        run: |
          test -f public/privacy-pages/privacy.css || { echo "❌ privacy.css not found"; exit 1; }
          echo "✅ privacy.css present"

  # ── 2. E2E tests ───────────────────────────────────────────────
  e2e:
    needs: validate
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        # Playwright starts and owns the static server via webServer in playwright.config.js
        run: npx playwright test
        env:
          CI: true
          HOME: /root

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 3. Deploy (main branch only, after e2e passes) ─────────────
  deploy:
    needs: e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
