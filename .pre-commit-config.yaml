repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: local
    hooks:
      - id: check-noopener
        name: "Security: target=_blank must have noopener"
        language: pygrep
        entry: 'target="_blank"(?![^>]*noopener)'
        files: \.html$
        types: [text]

      - id: check-stale-dates
        name: "Warn: privacy policy date older than 2025"
        language: pygrep
        entry: 'updated.*20(1[0-9]|2[0-3])'
        files: \.html$
        types: [text]
